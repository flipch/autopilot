version: 2
project_name: autopilot

builds:
  - id: autopilot
    main: ./cmd/autopilot
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags: |
      -s -w -X github.com/felipeh/autopilot/internal/autopilot.version={{.Version}} -X github.com/felipeh/autopilot/internal/autopilot.ref={{.ShortCommit}}

archives:
  - id: autopilot-binary
    builds:
      - autopilot
    format: binary
    name_template: '{{ .Binary }}{{ if eq .Os "windows" }}.exe{{ end }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: checksums.txt

release:
  github:
    owner: flipch
    name: autopilot
  draft: false
  prerelease: false
